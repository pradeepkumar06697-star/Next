name: Use Secrets Example

on:
  push:
    branches:
      - main

jobs:
  secret-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Secret Variable
        run: echo "Secret is being used safely"
        env:
          API_KEY: ${{ secrets.API_KEY }}
